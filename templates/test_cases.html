{% extends "base.html" %}
{% block title %}测试用例 - 服务器资源管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>测试用例管理</h1>
    <div>
        <button class="btn btn-primary" onclick="importMockCases()">导入 Mock 用例</button>
        <button class="btn btn-secondary" onclick="showImportForm()">导入 JSON</button>
        <button class="btn btn-primary" onclick="showAddCaseForm()">添加用例</button>
    </div>
</div>

<div id="import-form" class="form-card" style="display:none;">
    <h3>导入测试用例 (JSON 数组)</h3>
    <textarea id="import-json" rows="6" placeholder='[{"name":"test_example","module":"demo","description":"示例用例","params":{}}]'></textarea>
    <div class="form-actions">
        <button class="btn btn-primary" onclick="importCases()">导入</button>
        <button class="btn btn-secondary" onclick="hideImportForm()">取消</button>
    </div>
</div>

<div id="add-case-form" class="form-card" style="display:none;">
    <h3>添加测试用例</h3>
    <div class="form-row">
        <input type="text" id="case-name" placeholder="用例名称" required>
        <input type="text" id="case-module" placeholder="模块">
        <input type="text" id="case-desc" placeholder="描述">
    </div>
    <div class="form-actions">
        <button class="btn btn-primary" onclick="addCase()">提交</button>
        <button class="btn btn-secondary" onclick="hideAddCaseForm()">取消</button>
    </div>
</div>

<table class="data-table" id="cases-table">
    <thead>
        <tr><th>ID</th><th>名称</th><th>模块</th><th>描述</th><th>创建时间</th><th>操作</th></tr>
    </thead>
    <tbody></tbody>
</table>
{% endblock %}

{% block scripts %}
<script>
loadTestCases();
</script>
{% endblock %}
