<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}服务器资源管理系统{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>SRM</h2>
            <p>服务器资源管理</p>
        </div>
        <ul class="nav-links">
            <li><a href="/" class="{{ 'active' if page == 'dashboard' }}">仪表盘</a></li>
            <li><a href="/servers" class="{{ 'active' if page == 'servers' }}">服务器管理</a></li>
            <li><a href="/test-cases" class="{{ 'active' if page == 'cases' }}">测试用例</a></li>
            <li><a href="/tasks" class="{{ 'active' if page == 'tasks' }}">任务管理</a></li>
        </ul>
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
